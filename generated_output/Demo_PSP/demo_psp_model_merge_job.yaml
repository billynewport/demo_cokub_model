# model-merge-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-psp-model-merge-job
  namespace: demo-cokub
spec:
  template:
    spec:
      containers:
      - name: model-merge-handler
        image: registry.gitlab.com/datasurface-inc/datasurface/datasurface:v1.2.2
        command: ["/bin/bash"]
        args:
        - -c
        - |
          echo "🔄 Starting DataSurface Model Merge Handler"
          
          # Run merge handler for platform using cache-aware CLI
          echo "🔧 Running model merge handler with shared cache..."
          python -m datasurface.cmd.platform handleModelMerge \
            --git-repo-path /cache/git-cache \
            --git-repo-type github \
            --git-repo-url https://github.com \
            --git-repo-owner billynewport \
            --git-repo-name demo_cokub_model \
            --git-repo-branch main \
            --rte-name demo \
            --git-platform-repo-credential-name git \
            --use-git-cache \
            --max-cache-age-minutes 5 \
            --output /workspace/generated_artifacts \
            --psp Demo_PSP
          
          echo "✅ Model merge handler complete!"
        env:
        - name: PYTHONPATH
          value: "/app/src"
        - name: git_TOKEN
          valueFrom:
            secretKeyRef:
              name: git
              key: TOKEN
        - name: postgres-demo-merge_USER
          valueFrom:
            secretKeyRef:
              name: postgres-demo-merge
              key: USER
        - name: postgres-demo-merge_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-demo-merge
              key: PASSWORD
        volumeMounts:
        
        - name: git-model-cache
          mountPath: /cache/git-cache
        
        - name: workspace
          mountPath: /workspace
      volumes:
      
      - name: git-model-cache
        persistentVolumeClaim:
          claimName: git-cache-pvc
      
      - name: workspace
        emptyDir: {}
      restartPolicy: Never
  backoffLimit: 3 